name: Fleetarr

options:
  bundleIdPrefix: dev.radaiko
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # App views/persistence start in Swift 5 mode with progressive concurrency checking;
    # FleetarrKit is built in full Swift 6 mode (see its Package.swift).
    SWIFT_STRICT_CONCURRENCY: minimal
    # Sign locally with the Apple Development identity so the app has a stable, cert-based code
    # signature — the login keychain persists "Always Allow" against it (an ad-hoc cdhash identity
    # changes every build and is never remembered). CI/verification builds pass
    # CODE_SIGNING_ALLOWED=NO to skip signing entirely; a plain build signs automatically.
    DEVELOPMENT_TEAM: "555V4MNLK3"
    CODE_SIGN_STYLE: Automatic

packages:
  FleetarrKit:
    path: FleetarrKit
  Aptabase:
    url: https://github.com/aptabase/aptabase-swift.git
    from: "0.3.11"

targets:
  Fleetarr:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
    dependencies:
      - package: FleetarrKit
        product: FleetarrKit
      - package: Aptabase
        product: Aptabase
      - target: FleetarrWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.radaiko.Fleetarr
        PRODUCT_NAME: Fleetarr
        INFOPLIST_KEY_CFBundleDisplayName: Fleetarr
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unlock Fleetarr with Face ID.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ENABLE_HARDENED_RUNTIME: YES
        # iCloud on both platforms. macOS additionally requires this Mac to be registered in the
        # developer account — do that once by opening the project in Xcode and running for "My Mac"
        # (Xcode registers the Mac + provisions the profile). Until then, CLI macOS *signed* builds
        # fail; CODE_SIGNING_ALLOWED=NO verification builds still work.
        CODE_SIGN_ENTITLEMENTS: App/Fleetarr.entitlements
        # macOS needs the App Sandbox (+ network client) for the Mac App Store; iOS uses the file above.
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: App/Fleetarr-macOS.entitlements

  FleetarrWidget:
    type: app-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Widget
    dependencies:
      - package: FleetarrKit
        product: FleetarrKit
    info:
      path: Widget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        CFBundleDisplayName: Fleetarr
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: dev.radaiko.Fleetarr.Widget
        PRODUCT_NAME: FleetarrWidget
        PRODUCT_MODULE_NAME: FleetarrWidgetExtension
        SKIP_INSTALL: YES
        CODE_SIGN_ENTITLEMENTS: App/FleetarrWidget.entitlements
        CODE_SIGN_ENTITLEMENTS[sdk=macosx*]: App/FleetarrWidget-macOS.entitlements
