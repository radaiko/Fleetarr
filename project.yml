name: Fleetarr

options:
  bundleIdPrefix: net.radaiko
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    # App views/persistence start in Swift 5 mode with progressive concurrency checking;
    # FleetarrKit is built in full Swift 6 mode (see its Package.swift).
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  FleetarrKit:
    path: FleetarrKit

targets:
  Fleetarr:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
    dependencies:
      - package: FleetarrKit
        product: FleetarrKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.radaiko.Fleetarr
        PRODUCT_NAME: Fleetarr
        INFOPLIST_KEY_CFBundleDisplayName: Fleetarr
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ENABLE_HARDENED_RUNTIME: YES
